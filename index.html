<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Triwulan SIINas</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<div class="app">

<h1 class="title">
<span class="material-icons">assessment</span>
Laporan Triwulan SIINas
</h1>

<form id="formLaporan">

<div class="grid-form">

<!-- IDENTITAS -->

<div class="card">

<div class="card-title">
<span class="material-icons">badge</span>
<h3>Identitas</h3>
</div>

<input type="text" id="nib" placeholder="Nomor NIB">

<input type="text" id="namaPemilik" placeholder="Nama Pemilik">

<select id="jenisKelamin">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<select id="pendidikan">
<option>SD</option>
<option>SMP</option>
<option>SMA</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
</select>

</div>

<!-- PERIODE -->

<div class="card">

<div class="card-title">
<span class="material-icons">date_range</span>
<h3>Periode</h3>
</div>

<select id="periode">
<option>Triwulan I</option>
<option>Triwulan II</option>
<option>Triwulan III</option>
<option>Triwulan IV</option>
</select>

</div>

<!-- INVESTASI -->

<div class="card">

<div class="card-title">
<span class="material-icons">payments</span>
<h3>Investasi</h3>
</div>

<input type="number" id="nilaiMesin" placeholder="Nilai Mesin">

<input type="number" id="nilaiLainnya" placeholder="Nilai Lainnya">

<input type="number" id="modalKerja" placeholder="Modal Kerja">

<input type="number" id="nilaiTanah" placeholder="Nilai Tanah">

<input type="number" id="nilaiBangunan" placeholder="Nilai Bangunan">

</div>

<!-- MAKLON -->

<div class="card">

<div class="card-title">
<span class="material-icons">precision_manufacturing</span>
<h3>Maklon</h3>
</div>

<label>Menggunakan Jasa Maklon</label>
<select id="maklonPakai">
<option>Ya</option>
<option>Tidak</option>
</select>

<label>Menyediakan Jasa Maklon</label>
<select id="maklonSedia">
<option>Ya</option>
<option>Tidak</option>
</select>

</div>

<!-- PRODUKSI -->

<div class="card full">

<div class="card-title">
<span class="material-icons">factory</span>
<h3>Produksi</h3>
</div>

<input type="text" id="produk" placeholder="Produk">

<select id="satuan">
<option>Pcs</option>
<option>Lembar</option>
<option>Buah</option>
<option>Pack</option>
<option>Kilo</option>
</select>

<input type="number" id="kapasitasUnit" placeholder="Kapasitas Produksi Unit">

<input type="number" id="kapasitasKilo" placeholder="Kapasitas Produksi Kilo">

<input type="number" id="nilaiProduk" placeholder="Nilai Produk Triwulan">

</div>

<!-- BAHAN BAKU -->

<div class="card full">

<div class="card-title">
<span class="material-icons">inventory</span>
<h3>Bahan Baku</h3>
</div>

<input type="text" id="namaBahanBaku" placeholder="Nama Bahan Baku">

<input type="number" id="jumlahBahanBaku" placeholder="Jumlah Bahan Baku">

<select id="satuanBahanBaku">
<option>lembar</option>
<option>pcs</option>
<option>kilo</option>
<option>pack</option>
<option>bungkus</option>
</select>

<input type="number" id="nilaiBahanBaku" placeholder="Nilai Bahan Baku">

</div>

<!-- TENAGA KERJA -->

<div class="card">

<div class="card-title">
<span class="material-icons">groups</span>
<h3>Tenaga Kerja</h3>
</div>

<input type="number" id="tenagaKerjaLaki" placeholder="Laki-laki">

<input type="number" id="tenagaKerjaPerempuan" placeholder="Perempuan">

</div>

<!-- UTILITAS -->

<div class="card">

<div class="card-title">
<span class="material-icons">bolt</span>
<h3>Utilitas</h3>
</div>

<select id="air">
<option>Air Tanah</option>
<option>PDAM</option>
<option>Permukaan</option>
</select>

<select id="bahanBakar">
<option>Bensin</option>
<option>Solar</option>
<option>Pelumas</option>
<option>Minyak Tanah</option>
<option>Elpiji</option>
</select>

<input type="number" id="biayaListrik" placeholder="Biaya Listrik / bulan">

<select id="tipeKwh">
<option>450</option>
<option>900</option>
<option>1300</option>
<option>2200</option>
</select>

</div>

<!-- FOTO -->

<div class="card full">

<div class="card-title">
<span class="material-icons">photo_camera</span>
<h3>Upload Foto</h3>
</div>

<input type="file" id="foto">

</div>

</div>

<button class="submit-btn">
<span class="material-icons">send</span>
Kirim Laporan
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
