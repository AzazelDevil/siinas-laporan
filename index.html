<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Triwulan SIINas</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<div class="app">

<header class="app-header">
<h1>SIINas</h1>
<p>Laporan Triwulan Industri</p>
</header>

<form id="formLaporan">

<div class="card">

<div class="card-title">
<span class="material-icons">calendar_month</span>
<h3>Periode Laporan</h3>
</div>

<select id="periode" required>
<option value="">Pilih Periode</option>
<option>Triwulan I</option>
<option>Triwulan II</option>
<option>Triwulan III</option>
<option>Triwulan IV</option>
</select>

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">account_balance</span>
<h3>Investasi</h3>
</div>

<input type="number" id="nilaiMesin" placeholder="Nilai Mesin">

<input type="number" id="nilaiLainnya" placeholder="Nilai Lainnya">

<input type="number" id="modalKerja" placeholder="Modal Kerja">

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">handshake</span>
<h3>Maklon</h3>
</div>

<label>Menggunakan Maklon</label>
<select id="maklonPakai">
<option>Ya</option>
<option>Tidak</option>
</select>

<label>Menyediakan Maklon</label>
<select id="maklonSedia">
<option>Ya</option>
<option>Tidak</option>
</select>

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">person</span>
<h3>Pemilik</h3>
</div>

<input type="text" id="namaPemilik" placeholder="Nama Pemilik">

<select id="jenisKelamin">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<select id="pendidikan">
<option>SD</option>
<option>SMP</option>
<option>SMA</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
</select>

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">factory</span>
<h3>Produksi</h3>
</div>

<input type="text" id="produk" placeholder="Produk">

<select id="satuan">
<option>Lembar</option>
<option>Pcs</option>
<option>Buah</option>
<option>Pack</option>
</select>

<input type="number" id="kapasitasUnit" placeholder="Kapasitas Produksi (Unit)">

<input type="number" id="kapasitasKilo" placeholder="Kapasitas Produksi (Kilo)">

<input type="number" id="nilaiProduk" placeholder="Nilai Produk Triwulan (dalam rupiah)">

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">inventory</span>
<h3>Bahan Baku</h3>
</div>

<input type="text" id="namaBahanBaku" placeholder="Nama Bahan Baku">

<input type="number" id="jumlahBahanBaku" placeholder="Jumlah Bahan Baku">

<select id="satuanBahanBaku">
<option>Lembar</option>
<option>Kilo</option>
<option>Pcs</option>
<option>Pack</option>
<option>Bungkus</option>
</select>

<input type="number" id="nilaiBahanBaku" placeholder="Nilai Bahan Baku (dalam rupiah)">

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">domain</span>
<h3>Aset</h3>
</div>

<input type="number" id="nilaiTanah" placeholder="Nilai Tanah (dalam rupiah)">

<input type="number" id="nilaiBangunan" placeholder="Nilai Bangunan (dalam rupiah)">

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">groups</span>
<h3>Tenaga Kerja</h3>
</div>

<input type="number" id="tenagaKerjaLaki" placeholder="Tenaga Kerja Laki-laki">

<input type="number" id="tenagaKerjaPerempuan" placeholder="Tenaga Kerja Perempuan">

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">bolt</span>
<h3>Utilitas</h3>
</div>

<select id="air">
<option>Air Tanah</option>
<option>PDAM</option>
<option>Permukaan</option>
</select>

<select id="bahanBakar">
<option>Bensin</option>
<option>Solar</option>
<option>Pelumas</option>
<option>Minyak Tanah</option>
<option>Elpiji</option>
</select>

<input type="number" id="biayaListrik" placeholder="Biaya Listrik per bulan">

<select id="tipeKwh">
<option>450</option>
<option>900</option>
<option>1300</option>
<option>2200</option>
<option>3500</option>
</select>

</div>


<div class="card">

<div class="card-title">
<span class="material-icons">photo_camera</span>
<h3>Upload Foto</h3>
</div>

<input type="file" id="foto">

</div>


<button class="submit-btn">Kirim Laporan</button>

</form>

<div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
